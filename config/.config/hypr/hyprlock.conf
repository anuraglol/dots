$color      = rgba(6,11,30,1.0)
$font_color = rgba(255,206,173,1.0)
$accent     = rgba(125,130,217,1.0)
$field_bg   = rgba(255,255,255,0.08)
$field_border = rgba(255,255,255,0.12)
$field_focus  = rgba(125,130,217,0.9)

general {
    ignore_empty_input = true
    hide_cursor = false
}

background {
    monitor =
    path = ~/Pictures/2.jpg
    color = $color
    blur_passes = 4
    blur_size = 4
    brightness = 0.6
    contrast = 0.9
    vibrancy = 0.15
    vibrancy_darkness = 0.0
}

label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +'%H:%M')</span>"
    color = $font_color
    font_size = 96
    font_family = JetBrainsMono Bold
    position = 0, 160
    halign = center
    valign = center
}

# date below clock
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %d')"
    color = rgba(255,206,173,0.6)
    font_size = 18
    font_family = JetBrainsMono Light
    position = 0, 60
    halign = center
    valign = center
}

# password field — GNOME pill style
input-field {
    monitor =
    size = 360, 46
    position = 0, -120
    halign = center
    valign = center

    inner_color = $field_bg
    outer_color = $field_border
    check_color = $accent
    fail_color = rgba(235,100,100,0.9)

    outline_thickness = 2.5
    rounding = 8

    font_family = JetBrainsMono
    font_color = $font_color
    font_size = 16

    fail_text = <i>$FAIL</i>

    shadow_passes = 0
    fade_on_empty = false
    fade_timeout = 1500

    caps_lock_color = rgba(255,200,100,0.9)
}

auth {
    fingerprint:enabled = false
}
