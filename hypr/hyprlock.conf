$color = rgba(6,11,30, 1.0)
$inner_color = rgba(6,11,30, 0.8)
$outer_color = rgba(255,206,173, 1.0)
$font_color = rgba(255,206,173, 1.0)
$check_color = rgba(125,130,217, 1.0)

general {
    ignore_empty_input = true
}

background {
    monitor =
    color = $color
    path = ~/Pictures/wall.jpg
    blur_passes = 3
}

animations {
    enabled = true
}

input-field {
    monitor =
    size = 650, 100
    position = 0, 0
    halign = center
    valign = center

    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 4

    font_family = JetBrainsMono
    font_color = $font_color

    placeholder_text = Enter Password
    check_color = $check_color
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 0
    shadow_passes = 0
    fade_on_empty = false
}

auth {
    fingerprint:enabled = false
}
